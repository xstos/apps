<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>lit</title>
    <style>
        body {
            font-family: 'Consolas', sans-serif;
            letter-spacing: 0px;
        }
        .hovergrow {
            display: inline-block;      /* allows the transform to work cleanly */
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1),
            box-shadow 0.25s ease;
            will-change: transform;
            /* base style: subtle shadow & rounded */
            box-shadow: 0 8px 20px rgba(0, 20, 30, 0.08);
        }
        .hovergrow:hover {
            font-weight: bolder;
            transform: scale(1.3);      /* 8% bigger — noticeable but not obnoxious */
            box-shadow: 0 20px 35px -6px rgba(0, 30, 40, 0.25);
            z-index: 2;                 /* bring forward to avoid clipping */
        }
    </style>
</head>

<body>
<div id="app"></div>
<script src="lit-html.js"></script>
<script type="module">
    var log = console.log.bind(console)
    var el = document.getElementById.bind(document)

    const text = await (await fetch('lit-html.js')).text();
    //var lines = text.split('\n')
    const textarr = text.split('')
    var {html, render} = lit
    // 1. Define the Application State
    let counter = 0;
    const container = el('app');

    var tiles=textarr.map(tile)
    //var lineArrays = lines.map(line=>line.split('').map(tile))

    // 2. Define Pure Functional Components
    function Header(title) {
        return html`
        <h1>${title}</h1>
    `;
    }
    function rndByte() {
        return Math.floor(Math.random() * 255)
    }
    function getRandomColor(transp0to1) {
        return `rgba(${rndByte()},${rndByte()},${rndByte()}, ${transp0to1})`;
    }
    function tile(char) {
        if (char==='\n')
            return html`<br>`
        return html`<span class="hovergrow" style="color: ${getRandomColor(1)}; background-color: ${getRandomColor(0.2)}">${char}</span>`
    }

    function CounterApp(count, onIncrement) {
        return html`
        <div>
            ${Header('Classless Lit App')}
            <p>The count is currently: <strong>${count}</strong></p>
            <button @click=${onIncrement}>Increment Count</button>
            <br><br>
            ${tiles}
        </div>
    `;
    }

    // 3. State Mutation Handler
    function increment() {
        counter++;
        update(); // Manually trigger re-render
    }

    // 4. Render Engine Setup
    function update() {
        render(CounterApp(counter, increment), container);
    }

    // Initial Bootstrapping
    update();
</script>
</body>

</html>
