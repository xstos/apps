<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>lit</title>
    <style>
        body {
            font-family: 'Consolas', sans-serif;
            letter-spacing: 0px;
        }
        .hovergrow {
            display: inline-block;      /* allows the transform to work cleanly */
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1),
            box-shadow 0.25s ease;
            will-change: transform;
            /* base style: subtle shadow & rounded */
            box-shadow: 0 8px 20px rgba(0, 20, 30, 0.08);
        }
        .hovergrow:hover {
            font-weight: bolder;
            transform: scale(1.3);      /* 8% bigger — noticeable but not obnoxious */
            box-shadow: 0 20px 35px -6px rgba(0, 30, 40, 0.25);
            z-index: 2;                 /* bring forward to avoid clipping */
        }
    </style>
</head>

<body>
<div id="app"></div>
<script src="util.js"></script>
<script src="keystrokes.js"></script>
<script src="lit-html.js"></script>
<script src="nodes.js"></script>
<script src="bindings.js"></script>
<script type="module" src="main.js"></script>
</body>

</html>
